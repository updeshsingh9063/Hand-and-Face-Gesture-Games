<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Hand Tracking AR</title>

    <!-- MediaPipe CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #050510;
            --text-color: #ffffff;
            --glass-bg: rgba(20, 25, 40, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-blur: blur(16px);
            --accent: #00ffcc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .video-container {
            position: absolute;
            width: 100vw;
            height: 100vh;
        }

        .input_video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            /* Mirror */
            z-index: 0;
            /* Let the raw camera sit behind */
            filter: brightness(0.6) contrast(1.1);
            /* Subtle dark to make neon pop */
        }

        /* 
         * Background Canvas captures the video frame and applies the matrix rain/starfield 
         */
        #bgCanvas,
        #mainCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            /* Mirror */
        }

        #bgCanvas {
            z-index: 1;
            pointer-events: none;
        }

        #mainCanvas {
            z-index: 5;
            pointer-events: none;
            /* We use mix-blend-mode for the glowing effects in canvas */
        }

        /* UI Overlays */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            min-width: 180px;
        }

        .stat:last-child {
            margin-bottom: 0;
        }

        .stat span.val {
            font-weight: bold;
            color: var(--accent);
        }

        /* Themes */
        #themes {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 8px;
            transition: opacity 0.5s;
        }

        .theme-btn {
            background: transparent;
            border: 1px solid transparent;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s ease;
            font-weight: 500;
        }

        .theme-btn.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            text-shadow: 0 0 10px white;
        }

        /* Games Launch Button */
        #gamesBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: linear-gradient(135deg, rgba(255,0,204,0.3), rgba(51,51,255,0.3));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,0,204,0.5);
            border-radius: 14px;
            padding: 12px 22px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255,0,204,0.2);
            pointer-events: all;
            text-decoration: none;
        }
        #gamesBtn:hover {
            transform: scale(1.06);
            box-shadow: 0 0 35px rgba(255,0,204,0.5);
            border-color: rgba(255,0,204,0.9);
        }
        #gamesBtn .icon { font-size: 1.3rem; }

        /* Face Toggle Button */
        #faceToggleBtn {
            position: absolute;
            top: 20px;
            right: 210px;          /* sits left of the games button */
            z-index: 10;
            background: rgba(10, 15, 35, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 240, 255, 0.35);
            border-radius: 14px;
            padding: 11px 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 9px;
            transition: all 0.3s ease;
            pointer-events: all;
        }
        #faceToggleBtn .ftb-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transition: background 0.3s, box-shadow 0.3s;
        }
        #faceToggleBtn.face-on {
            background: rgba(0, 240, 255, 0.12);
            border-color: rgba(0, 240, 255, 0.8);
            color: #00f0ff;
            box-shadow: 0 0 22px rgba(0, 240, 255, 0.3);
        }
        #faceToggleBtn.face-on .ftb-dot {
            background: #00f0ff;
            box-shadow: 0 0 10px #00f0ff;
        }
        #faceToggleBtn:hover { transform: scale(1.05); }

        /* Author credit badge */
        #authorBadge {
            position: absolute;
            bottom: 18px;
            left: 20px;
            z-index: 10;
            background: rgba(10, 12, 30, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 8px 14px;
            pointer-events: none;
            line-height: 1.5;
        }
        #authorBadge .ab-name {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        #authorBadge .ab-info {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.45);
        }

        /* Start Overlay */
        #startOverlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: opacity 0.5s ease;
        }

        .start-btn {
            padding: 16px 40px;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 204, 0.5);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <!-- Start Overlay (Required for AudioContext initialization) -->
    <div id="startOverlay">
        <h1 style="margin-bottom: 20px; font-weight: 300; letter-spacing: 4px;">NEON AURA AR</h1>
        <p style="margin-bottom: 10px; color: #888;">Grant camera permissions and click to start audio/visual experience</p>
        <p style="margin-bottom: 40px; font-size: 0.78rem; color: rgba(0,240,255,0.5); letter-spacing: 1px;">
            Created by <strong style="color:rgba(0,240,255,0.85);">Updesh Singh</strong>
            &nbsp;&middot;&nbsp; B.Tech CS (AIML) &nbsp;&middot;&nbsp; GLA University
        </p>
        <button class="start-btn" id="startBtn">Enter Experience</button>
    </div>

    <div class="video-container">
        <video class="input_video" autoplay playsinline></video>
        <canvas id="bgCanvas"></canvas>
        <canvas id="mainCanvas"></canvas>
    </div>

    <!-- Author credit badge -->
    <div id="authorBadge" class="hidden">
        <div class="ab-name">👨‍💻 Updesh Singh</div>
        <div class="ab-info">B.Tech CS (AIML) &nbsp;&bull;&nbsp; GLA University</div>
    </div>

    <!-- Face Detection Toggle Button -->
    <button id="faceToggleBtn" class="hidden" onclick="toggleFaceDetection()">
        <span class="ftb-dot"></span>
        <span id="faceToggleLabel">👁 Face: OFF</span>
    </button>

    <!-- Games Button (always visible once started) -->
    <a id="gamesBtn" class="hidden" href="games.html" target="_blank">
        <span class="icon">🎮</span> Play Hand Games
    </a>

    <!-- UI Overlay -->
    <div id="hud" class="hidden">
        <div class="panel">
            <div class="stat">Hands Detected: <span class="val" id="ui-hands">0</span></div>
            <div class="stat">Face: <span class="val" id="ui-face">None</span></div>
            <div class="stat">FPS: <span class="val" id="ui-fps">0</span></div>
        </div>
        <div class="panel">
            <div class="stat">Gesture: <span class="val" id="ui-gesture">None</span></div>
            <div class="stat">Spread: <span class="val" id="ui-spread">0%</span></div>
        </div>
    </div>

    <div id="themes" class="hidden">
        <button class="theme-btn active" data-theme="Rainbow">Rainbow</button>
        <button class="theme-btn" data-theme="Cyberpunk">Cyberpunk</button>
        <button class="theme-btn" data-theme="Lava">Lava</button>
        <button class="theme-btn" data-theme="Ocean">Ocean</button>
        <button class="theme-btn" data-theme="Galaxy">Galaxy</button>
    </div>

    <script>
        /** 
         * GLOBALS & CONFIG
         */
        const videoElement = document.querySelector('.input_video');
        const bgCanvas = document.getElementById('bgCanvas');
        const mainCanvas = document.getElementById('mainCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        const ctx = mainCanvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;

        let time = 0;
        let lastTime = performance.now();
        let framesThisSecond = 0;
        let lastFpsTime = performance.now();

        let currentHands = []; // Latest data from MediaPipe
        let handVelocities = 0; // Average hand movement speed

        // Theme Config
        let currentTheme = 'Rainbow';
        const themes = {
            'Rainbow': (t, index, total) => `hsl(${(t * 100 + index * (360 / total)) % 360}, 100%, 60%)`,
            'Cyberpunk': (t, index, total) => (index % 2 === 0) ? '#ff003c' : '#00f0ff',
            'Lava': (t, index, total) => `hsl(${(10 + (index * 10)) % 40}, 100%, ${50 + Math.sin(t) * 10}%)`,
            'Ocean': (t, index, total) => `hsl(${180 + (index * 20)}, 100%, 60%)`,
            'Galaxy': (t, index, total) => `hsl(${260 + Math.sin(t * 2 + index) * 40}, 100%, 65%)`
        };

        // Physics Engines Data
        let particles = [];
        let ripples = [];
        const FINGER_TIPS = [4, 8, 12, 16, 20];

        // Matrix Background
        let matrixColumns = [];
        const fontSize = 16;
        let maxColumns = 0;

        // Audio Node References
        let audioCtx = null;
        let humOsc = null;
        let humGain = null;

        // UI Elements
        const uiHands = document.getElementById('ui-hands');
        const uiFps = document.getElementById('ui-fps');
        const uiGesture = document.getElementById('ui-gesture');
        const uiSpread = document.getElementById('ui-spread');
        const uiFace = document.getElementById('ui-face');

        // Face Mesh state
        let currentFaces = [];
        let faceDetectionEnabled = false;  // OFF by default
        let faceMeshInstance = null;        // created lazily on first enable

        function toggleFaceDetection() {
            faceDetectionEnabled = !faceDetectionEnabled;
            const btn = document.getElementById('faceToggleBtn');
            const lbl = document.getElementById('faceToggleLabel');

            if (faceDetectionEnabled) {
                btn.classList.add('face-on');
                lbl.textContent = '👁 Face: ON';
                // Lazily create the FaceMesh instance once
                if (!faceMeshInstance) {
                    faceMeshInstance = new FaceMesh({
                        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
                    });
                    faceMeshInstance.setOptions({
                        maxNumFaces: 1,
                        refineLandmarks: true,
                        minDetectionConfidence: 0.5,
                        minTrackingConfidence: 0.5
                    });
                    faceMeshInstance.onResults((results) => {
                        if (!faceDetectionEnabled) return;
                        currentFaces = results.multiFaceLandmarks || [];
                        uiFace.innerText = currentFaces.length > 0 ? '✓ Detected' : 'None';
                    });
                }
            } else {
                btn.classList.remove('face-on');
                lbl.textContent = '👁 Face: OFF';
                currentFaces = [];          // clear immediately
                uiFace.innerText = 'Off';
            }
        }

        /**
         * INITIALIZATION
         */
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            bgCanvas.width = width;
            bgCanvas.height = height;
            mainCanvas.width = width;
            mainCanvas.height = height;

            maxColumns = Math.floor(width / fontSize);
            matrixColumns = new Array(maxColumns).fill(1).map(() => Math.random() * height / fontSize);
        }
        window.addEventListener('resize', resize);
        resize();

        // UI Theme Switcher
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentTheme = e.target.getAttribute('data-theme');
                document.documentElement.style.setProperty('--accent', themes[currentTheme](0, 1, 1));
            });
        });

        // Start button triggers AudioContext and hides overlay
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('themes').classList.remove('hidden');
            document.getElementById('gamesBtn').classList.remove('hidden');
            document.getElementById('faceToggleBtn').classList.remove('hidden');
            document.getElementById('authorBadge').classList.remove('hidden');
            initAudio();
            initMediaPipe();
            requestAnimationFrame(renderLoop);
        });


        /**
         * AUDIO ENGINE
         */
        function initAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                // Continuous Hum
                humOsc = audioCtx.createOscillator();
                humGain = audioCtx.createGain();

                humOsc.type = 'sine';
                humOsc.frequency.value = 100;

                humGain.gain.value = 0; // Mute until hands are seen

                humOsc.connect(humGain);
                humGain.connect(audioCtx.destination);
                humOsc.start();
            } catch (e) {
                console.error("Web Audio API failed", e);
            }
        }

        function triggerZap() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // Zap sound profile
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);

            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function updateHum(activeHands) {
            if (!audioCtx || !humGain) return;
            if (activeHands.length < 2) {
                humGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                return;
            }

            // Measure distance between index fingers to modulate volume
            const p1 = activeHands[0][8];
            const p2 = activeHands[1][8];
            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // The closer they are, the higher the pitch and volume
            const targetFreq = 100 + (1 - Math.min(dist, 1)) * 300;
            const targetVolume = 0.05 + (1 - Math.min(dist, 1)) * 0.15;

            humOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
            humGain.gain.setTargetAtTime(targetVolume, audioCtx.currentTime, 0.1);
        }

        /**
         * MATH & STATE LOGIC
         */
        function getDist(p1, p2) {
            return Math.hypot(p1.x - p2.x, p1.y - p2.y);
        }

        // Convert normalized landmark to specific canvas scale (Note: canvas is horizontally flipped)
        function mapToCanvas(point) {
            return { x: point.x * width, y: point.y * height };
        }

        let lastPinchState = [false, false]; // Prevents rapid re-triggering

        function detectGestures() {
            if (!currentHands.length) return;

            currentHands.forEach((hand, idx) => {
                // Pinch Detection: Thumb (4) and Index (8)
                const thumb = hand[4];
                const index = hand[8];
                const dist = getDist(thumb, index);

                const isPinching = dist < 0.05; // 5% of screen screen distance

                if (isPinching && !lastPinchState[idx]) {
                    const midpoint = {
                        x: (thumb.x + index.x) / 2,
                        y: (thumb.y + index.y) / 2
                    };
                    createShockwave(mapToCanvas(midpoint), themes[currentTheme](time, 1, 1));
                    triggerZap();
                    uiGesture.innerText = "PINCH !";
                }
                lastPinchState[idx] = isPinching;
            });

            // Spread Percentage roughly estimated by distance from Palm(0) to Index(8) and Pinky(20)
            if (currentHands[0]) {
                const spread = getDist(currentHands[0][8], currentHands[0][20]);
                // Normalizing spread so max is around 100%
                let spreadPct = Math.min(Math.round(spread * 300), 100);
                uiSpread.innerText = spreadPct + '%';
                if (!lastPinchState.includes(true)) {
                    uiGesture.innerText = spreadPct > 50 ? "Open Hand" : "Fist";
                }
            }
        }

        /**
         * EFFECTS & PHYSICS
         */
        function createParticles(pos, color, count = 3) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: pos.x,
                    y: pos.y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0,
                    color: color,
                    size: Math.random() * 3 + 1
                });
            }
        }

        function createShockwave(pos, color) {
            ripples.push({
                x: pos.x,
                y: pos.y,
                radius: 0,
                maxRadius: 150 + Math.random() * 100,
                life: 1.0,
                color: color
            });
        }

        // Background Effect Engine
        function drawBackground() {
            // Use destination-out to fade out the previous frame's drops, leaving a transparent trail
            bgCtx.globalCompositeOperation = 'destination-out';
            bgCtx.fillStyle = `rgba(0, 0, 0, ${0.15 + Math.min(handVelocities * 10, 0.5)})`;
            bgCtx.fillRect(0, 0, width, height);
            bgCtx.globalCompositeOperation = 'source-over';

            // Matrix Rain Effect mapping to hand speed
            bgCtx.fillStyle = themes[currentTheme](time, 1, 1);
            bgCtx.font = fontSize + "px monospace";

            // Matrix speed boosts when hands move fast
            let speedMult = 1 + (handVelocities * 100);

            for (let i = 0; i < matrixColumns.length; i++) {
                // Only draw randomly to keep it sparse like stars/rain
                if (Math.random() > 0.95) {
                    const char = String.fromCharCode(0x30A0 + Math.random() * 96);
                    bgCtx.fillText(char, i * fontSize, matrixColumns[i] * fontSize);
                }

                matrixColumns[i] += Math.random() * speedMult;

                if (matrixColumns[i] * fontSize > height && Math.random() > 0.9) {
                    matrixColumns[i] = 0;
                }
            }
        }

        function updatePhysics() {
            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;     // Fade out
                p.vy += 0.1;        // Gravity

                if (p.life <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.fill();
                }
            }

            // Ripples / Shockwaves
            for (let i = ripples.length - 1; i >= 0; i--) {
                let r = ripples[i];
                r.radius += (r.maxRadius - r.radius) * 0.1; // Ease out
                r.life -= 0.03;

                if (r.life <= 0) {
                    ripples.splice(i, 1);
                } else {
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = r.color;
                    ctx.lineWidth = 4 * r.life;
                    ctx.globalAlpha = r.life;
                    ctx.stroke();
                }
            }
            ctx.globalAlpha = 1.0; // Reset
        }

        /**
         * MAIN RENDER PIPELINE
         */
        function renderLoop(timestamp) {
            requestAnimationFrame(renderLoop);

            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            time += dt;

            // Update FPS Counter
            framesThisSecond++;
            if (timestamp > lastFpsTime + 1000) {
                uiFps.innerText = framesThisSecond;
                framesThisSecond = 0;
                lastFpsTime = timestamp;
            }

            drawBackground();

            // The main canvas will clear fully each frame since we handle ghosting via bgCanvas 
            // BUT user requested trailing motion blur for fingertips.
            // Instead of clearRect, we fade the main canvas using destination-out to keep it transparent
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // Enable Screen mode for additive light effects (like neon bloom)
            ctx.globalCompositeOperation = 'screen'; // Creates glowy overlapping effects

            // Render Physics layer
            updatePhysics();

            // Process Hand Logic if present
            if (currentHands.length > 0) {

                // 1. Draw Skeleton
                currentHands.forEach((hand, handIndex) => {
                    const glowColor = themes[currentTheme](time, handIndex, 2);

                    // Draw MediaPipe skeleton connectors using custom styles
                    drawConnectors(ctx, hand, HAND_CONNECTIONS, {
                        color: glowColor,
                        lineWidth: 2
                    });

                    // Draw Landmarks with neon bloom
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = glowColor;

                    // Only draw fingertips with intense bloom and spawn particles
                    FINGER_TIPS.forEach((tipIndex, idx) => {
                        const pt = mapToCanvas(hand[tipIndex]);
                        const tipCol = themes[currentTheme](time, idx, FINGER_TIPS.length);

                        ctx.beginPath();
                        ctx.arc(pt.x, pt.y, 4, 0, Math.PI * 2);
                        ctx.fillStyle = '#fff';
                        ctx.fill();

                        // Generate constant spark particles at fingertips
                        if (Math.random() > 0.6) {
                            createParticles(pt, tipCol, 1);
                        }
                    });
                    ctx.shadowBlur = 0; // Reset
                });

                // 2. Cross-Hand Interactions (Lightning & Gradients)
                if (currentHands.length >= 2) {
                    const h1 = currentHands[0];
                    const h2 = currentHands[1];

                    // A. Rainbow Connecting Lines
                    FINGER_TIPS.forEach((tipIndex, idx) => {
                        const pt1 = mapToCanvas(h1[tipIndex]);
                        const pt2 = mapToCanvas(h2[tipIndex]);
                        const dist = getDist(pt1, pt2);

                        const col = themes[currentTheme](time, idx, FINGER_TIPS.length);

                        // Lightning electric arc when very close (but not touching)
                        if (dist < 150 && Math.random() > 0.5) {
                            // Draw jagged lightning
                            ctx.beginPath();
                            ctx.moveTo(pt1.x, pt1.y);
                            // Midpoint jitter
                            const midX = (pt1.x + pt2.x) / 2 + (Math.random() - 0.5) * 50;
                            const midY = (pt1.y + pt2.y) / 2 + (Math.random() - 0.5) * 50;
                            ctx.lineTo(midX, midY);
                            ctx.lineTo(pt2.x, pt2.y);

                            ctx.strokeStyle = '#ffffff';
                            ctx.shadowBlur = 20;
                            ctx.shadowColor = col;
                            ctx.lineWidth = 3;
                            ctx.stroke();
                        }

                        // Normal flowing gradient line
                        ctx.beginPath();
                        ctx.moveTo(pt1.x, pt1.y);
                        ctx.lineTo(pt2.x, pt2.y);

                        // Create gradient that shifts over time
                        let grad = ctx.createLinearGradient(pt1.x, pt1.y, pt2.x, pt2.y);
                        grad.addColorStop(0, themes[currentTheme](time, idx, 5));
                        grad.addColorStop(0.5, themes[currentTheme](time, idx + 1, 5));
                        grad.addColorStop(1, themes[currentTheme](time, idx + 2, 5));

                        ctx.strokeStyle = grad;
                        ctx.lineWidth = 4;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = col;
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                    });

                    // B. Mandala drawing if 10 tips are perfectly detected
                    // (Assuming if we have 2 hands, we draw lines connecting all tips in a star)
                    if (h1 && h2) {
                        // Combine all 10 tips
                        let allTips = FINGER_TIPS.map(t => mapToCanvas(h1[t])).concat(
                            FINGER_TIPS.map(t => mapToCanvas(h2[t])));

                        ctx.save();
                        // Find center point to draw Mandala
                        let cx = allTips.reduce((sum, p) => sum + p.x, 0) / 10;
                        let cy = allTips.reduce((sum, p) => sum + p.y, 0) / 10;

                        ctx.translate(cx, cy);
                        ctx.rotate(time * 0.5); // Slow rotation

                        ctx.beginPath();
                        for (let i = 0; i < 10; i++) {
                            const t1 = { x: allTips[i].x - cx, y: allTips[i].y - cy };
                            const t2 = { x: allTips[(i + 3) % 10].x - cx, y: allTips[(i + 3) % 10].y - cy };
                            ctx.moveTo(t1.x, t1.y);
                            ctx.lineTo(t2.x, t2.y);
                        }
                        ctx.strokeStyle = `rgba(255, 255, 255, 0.2)`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        ctx.restore();
                    }
                }

                detectGestures();
            }

            // Draw face mask on top
            drawFaceMask();

            ctx.globalCompositeOperation = 'source-over'; // Restore
        }

        /**
         * FACE MESH DRAWING
         */
        // Contour indices for key facial features we want to highlight
        const FACE_CONTOUR_INDICES = [
            // Lips outer
            61,185,40,39,37,0,267,269,270,409,291,375,321,405,314,17,84,181,91,146,
            // Left eye
            362,382,381,380,374,373,390,249,263,466,388,387,386,385,384,398,
            // Right eye
            33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246,
            // Eyebrows
            70,63,105,66,107,55,65,52,53,46,
            336,296,334,293,300,276,283,282,295,285
        ];

        function drawFaceMask() {
            if (!currentFaces.length) return;

            currentFaces.forEach((face) => {
                const t = time;
                const faceColor = themes[currentTheme](t, 0, 1);
                const faceColor2 = themes[currentTheme](t, 2, 5);

                // === 1. Draw wireframe tesselation (very subtle) ===
                if (FACEMESH_TESSELATION) {
                    ctx.globalAlpha = 0.06;
                    ctx.strokeStyle = faceColor;
                    ctx.lineWidth = 0.4;
                    ctx.shadowBlur = 0;
                    FACEMESH_TESSELATION.forEach(([s, e]) => {
                        const p1 = mapToCanvas(face[s]);
                        const p2 = mapToCanvas(face[e]);
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    });
                    ctx.globalAlpha = 1;
                }

                // === 2. Draw face contours (bright neon lines) ===
                if (FACEMESH_CONTOURS) {
                    ctx.globalAlpha = 0.85;
                    ctx.strokeStyle = faceColor;
                    ctx.lineWidth = 1.5;
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = faceColor;
                    FACEMESH_CONTOURS.forEach(([s, e]) => {
                        const p1 = mapToCanvas(face[s]);
                        const p2 = mapToCanvas(face[e]);
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    });
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                }

                // === 3. Draw glowing iris rings ===
                // Left iris center ~landmark 468, right ~473 (with refineLandmarks)
                const irisL = face[468] ? mapToCanvas(face[468]) : null;
                const irisR = face[473] ? mapToCanvas(face[473]) : null;

                [irisL, irisR].forEach(iris => {
                    if (!iris) return;
                    const irisColor = themes[currentTheme](t, 3, 5);
                    ctx.beginPath();
                    ctx.arc(iris.x, iris.y, 8, 0, Math.PI * 2);
                    ctx.strokeStyle = irisColor;
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = irisColor;
                    ctx.globalAlpha = 0.9;
                    ctx.stroke();

                    // Inner dot
                    ctx.beginPath();
                    ctx.arc(iris.x, iris.y, 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                });

                // === 4. Mouth open detection -> extra glow ===
                // Upper lip: 13, Lower lip: 14 (inner lips)
                const upperLip = face[13] ? mapToCanvas(face[13]) : null;
                const lowerLip = face[14] ? mapToCanvas(face[14]) : null;
                if (upperLip && lowerLip) {
                    const mouthGap = Math.abs(lowerLip.y - upperLip.y);
                    if (mouthGap > 8) {
                        // Mouth is open — draw energy burst from mouth
                        const mouthCenter = { x: (upperLip.x + lowerLip.x) / 2, y: (upperLip.y + lowerLip.y) / 2 };
                        const burstRadius = mouthGap * 3;
                        const grad = ctx.createRadialGradient(mouthCenter.x, mouthCenter.y, 0, mouthCenter.x, mouthCenter.y, burstRadius);
                        grad.addColorStop(0, faceColor.replace(')', ', 0.6)').replace('hsl', 'hsla').replace('rgb', 'rgba'));
                        grad.addColorStop(1, 'transparent');
                        ctx.beginPath();
                        ctx.arc(mouthCenter.x, mouthCenter.y, burstRadius, 0, Math.PI * 2);
                        ctx.fillStyle = grad;
                        ctx.globalAlpha = 0.4;
                        ctx.fill();
                        ctx.globalAlpha = 1;
                    }
                }
            });
        }

        /**
         * MEDIAPIPE INITIALIZATION
         */
        function initMediaPipe() {
            // --- Hands ---
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });
            hands.onResults((results) => {
                if (!audioCtx) return;
                uiHands.innerText = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
                if (currentHands.length > 0 && results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const oldP = currentHands[0][8];
                    const newP = results.multiHandLandmarks[0][8];
                    if (oldP && newP) handVelocities = getDist(oldP, newP);
                } else {
                    handVelocities = 0;
                }
                currentHands = results.multiHandLandmarks || [];
                updateHum(currentHands);
            });

            // Single camera — face mesh is fed only when enabled
            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                    if (faceDetectionEnabled && faceMeshInstance) {
                        await faceMeshInstance.send({ image: videoElement });
                    }
                },
                width: 1280,
                height: 720,
                facingMode: 'user'
            });
            camera.start();
        }

    </script>
